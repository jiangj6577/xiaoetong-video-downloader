<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Xiaoetong Downloader</title>
  <link rel="stylesheet" href="styles.css" />
</head>

<body>
  <div class="backdrop">
    <div class="orb orb-a"></div>
    <div class="orb orb-b"></div>
    <div class="grid-lines"></div>
  </div>

  <main class="app">
    <header class="hero">
      <div>
        <p class="eyebrow">Batch workflow</p>
        <h1>Xiaoetong Downloader</h1>
        <p class="subhead">
          Fill in the table below and batch download HLS videos with auto-merge.
        </p>
      </div>
      <div class="status-card">
        <div class="status-label">Status</div>
        <div id="statusText" class="status-value">Idle</div>
        <div class="status-meta">
          <span id="batchProgress"></span>
          <span id="progressText">0 / 0</span>
        </div>
        <div class="progress-track">
          <div id="progressBar" class="progress-bar" style="width: 0%"></div>
        </div>
      </div>
    </header>

    <section class="grid">
      <!-- Common params -->
      <div class="card">
        <h2>Common Params</h2>
        <label class="field">
          <span>userId</span>
          <input id="userId" placeholder="u_xxx" />
        </label>

        <label class="field">
          <div class="field-header">
            <span>tsUrlDemo</span>
            <span class="tag">Optional</span>
          </div>
          <textarea id="tsUrlDemo" rows="2" placeholder="https://...ts?sign=...&t=...&us=...&whref=..."></textarea>
          <p class="hint">
            Only needed when ts lines in the m3u8 do not include query parameters.
          </p>
        </label>

        <label class="field">
          <span>referer</span>
          <input id="referer" placeholder="https://..." />
        </label>

        <label class="field">
          <span>Output root</span>
          <div class="row">
            <input id="outputRoot" placeholder="Select a folder" />
            <button id="browseBtn" class="btn ghost" type="button">Browse</button>
          </div>
        </label>
      </div>

      <!-- Batch Table -->
      <div class="card batch-card">
        <div class="batch-table-header">
          <h2>Download List</h2>
          <button id="addRowBtn" class="btn ghost small" type="button">+ Add Row</button>
        </div>

        <div class="batch-table-wrap">
          <table class="batch-table" id="batchTable">
            <thead>
              <tr>
                <th class="col-index">#</th>
                <th class="col-name">Name (folder & file)</th>
                <th class="col-url">m3u8 URL</th>
                <th class="col-status">Status</th>
                <th class="col-action"></th>
              </tr>
            </thead>
            <tbody id="batchTableBody">
              <!-- Rows inserted by JS -->
            </tbody>
          </table>
        </div>

        <div class="actions">
          <button id="startBtn" class="btn primary">Start</button>
          <button id="cancelBtn" class="btn ghost" disabled>Cancel</button>
        </div>
      </div>

      <div class="card log">
        <div class="log-header">
          <h2>Logs</h2>
          <button id="clearLogBtn" class="btn ghost small" type="button">Clear</button>
        </div>
        <pre id="logOutput"></pre>
      </div>
    </section>
  </main>

  <script src="renderer.js"></script>
</body>

</html>
